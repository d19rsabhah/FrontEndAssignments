<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Nested HTML Tables</title>
  </head>
  <body>
    <table class="main-table">
      <tr>
        <td>
          <table class="nested">
            <tr>
              <th colspan="2">Nested Table 2</th>
            </tr>

            <tr>
              <th>Column 1</th>
              <th>Column 2</th>
            </tr>

            <tr>
              <td>abc</td>
              <td>def</td>
            </tr>
          </table>
        </td>

        <td>
          <table class="nested">
            <tr>
              <th>Nested Table 1</th>
            </tr>

            <tr>
              <td>
                <ul>
                  <li>List item</li>
                  <li>List item</li>
                  <li>List item</li>
                </ul>
              </td>
            </tr>
          </table>
        </td>
      </tr>

      <tr>
        <td>
          <table class="nested">
            <tr>
              <th colspan="2">Nested Table 3</th>
            </tr>

            <tr>
              <td><a href="#">Nested Table</a></td>
              <td>Demo Continued</td>
            </tr>
          </table>
        </td>

        <td>
          <table class="nested">
            <tr>
              <th>Nested Table 4</th>
            </tr>

            <tr>
              <td class="html-cell">HTML</td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
