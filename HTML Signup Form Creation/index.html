<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Sign-Up Form</title>
  </head>
  <body>
    <form method="post">
      <label for="name">Name</label>
      <input type="text" id="name" placeholder="Name" required /><br />

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="Email" required /><br />

      <label>Gender :</label>
      <input type="radio" id="gender_m" name="gender" required />
      <label for="gender_m">Male</label>

      <input type="radio" id="gender_f" name="gender" required />
      <label for="gender_f">Female</label><br />

      <label for="cars">Car Brands</label>
      <select id="cars" required>
        <option value="">--Please choose an option--</option>
        <option>Porsche</option>
        <option>Ferrari</option>
        <option>Rolls Royce</option>
        <option>Bentley</option>
        <option>Aston Martin</option>
        <option>Maserati</option></select
      ><br />

      <label for="age">Age</label>
      <input type="number" id="age" placeholder="Age" required /><br />

      <label for="dob">DOB</label>
      <input type="date" id="dob" required /><br />

      <label for="tel">Phone Number</label>
      <input type="tel" id="tel" placeholder="xxx-xxx-xxxx" /><br />

      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      /><br />

      <input type="checkbox" id="tos" required />
      <label for="tos">I agree to the TOS</label><br />

      <button type="submit">Submit</button>
    </form>
  </body>
</html>
